<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FundR</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --panel: #ffffff;
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --accent: #0f766e;
        --text: #0f172a;
        --muted: #64748b;
        --success: #16a34a;
        --danger: #dc2626;
        --border: #e2e8f0;
        --shadow: 0 16px 45px rgba(15, 23, 42, 0.08);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #f8fbff, #eef4ff 55%, #f8fafc);
        color: var(--text);
      }
      .app-shell { max-width: 1220px; margin: 0 auto; padding: 24px; }
      .topbar {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 20px 24px;
        display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow);
      }
      .brand { font-size: 1.35rem; font-weight: 800; }
      .subtle { color: var(--muted); margin-top: 4px; }
      .switch-row { display: flex; align-items: center; gap: 10px; }
      .switch {
        position: relative; display: inline-flex; align-items: center; width: 64px; height: 34px;
        background: #cbd5e1; border-radius: 999px; cursor: pointer; transition: .2s; border: none;
      }
      .switch::after {
        content: ''; position: absolute; left: 4px; width: 26px; height: 26px; border-radius: 50%; background: white; box-shadow: 0 2px 6px rgba(0,0,0,.2); transition: .2s;
      }
      .switch.active { background: var(--primary); }
      .switch.active::after { transform: translateX(30px); }
      .panel { margin-top: 20px; background: var(--panel); border: 1px solid var(--border); border-radius: 24px; padding: 24px; box-shadow: var(--shadow); }
      .grid { display: grid; gap: 20px; }
      .grid.two { grid-template-columns: 1fr 1fr; }
      .card { border: 1px solid var(--border); border-radius: 18px; padding: 18px; background: linear-gradient(180deg, white, #fbfdff); }
      .accordion-item { border: 1px solid var(--border); border-radius: 18px; overflow: hidden; background: white; }
      .accordion-header { width: 100%; text-align: left; padding: 16px 18px; background: #f8fbff; border: none; display: flex; justify-content: space-between; align-items: center; font-size: 1rem; font-weight: 700; color: var(--text); }
      .accordion-body { padding: 0 18px 18px; display: none; }
      .accordion-item.open .accordion-body { display: block; }
      .accordion-icon { transition: transform .2s ease; }
      .accordion-item.open .accordion-icon { transform: rotate(180deg); }
      form { display: grid; gap: 12px; }
      label { font-weight: 700; color: var(--muted); font-size: .95rem; }
      input, textarea, button { font: inherit; }
      input, textarea { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; background: #fff; }
      button { border: none; border-radius: 12px; padding: 12px 16px; cursor: pointer; font-weight: 700; }
      .primary { background: var(--primary); color: white; }
      .primary:hover { background: var(--primary-dark); }
      .secondary { background: #e2e8f0; color: var(--text); }
      .success { background: var(--success); color: white; }
      .danger { background: var(--danger); color: white; }
      .muted { color: var(--muted); }
      .request-card { border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; background: #f8fafc; }
      .request-card .row { display: flex; justify-content: space-between; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
      .pill { display: inline-block; padding: 6px 10px; border-radius: 999px; font-size: .8rem; font-weight: 700; }
      .pill.pending { background: #fef3c7; color: #92400e; }
      .pill.approved { background: #dcfce7; color: #166534; }
      .pill.rejected { background: #fee2e2; color: #991b1b; }
      .status { font-size: .95rem; color: var(--muted); }
      .hidden { display: none; }
      .toast { margin-top: 12px; padding: 12px 14px; border-radius: 12px; background: #eff6ff; color: var(--primary-dark); border: 1px solid #bfdbfe; }
      .empty { color: var(--muted); padding: 8px 0; }
      .tiny { font-size: .85rem; color: var(--muted); }
      .actions { display: flex; gap: 8px; flex-wrap: wrap; }
      @media (max-width: 900px) { .grid.two { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <div class="brand">FundR</div>
        </div>
        <div class="switch-row">
          <span id="roleLabel">Borrower mode</span>
          <button id="roleSwitch" class="switch" aria-label="Switch interfaces"></button>
        </div>
      </header>

      <section id="borrowerView" class="panel">
        <div class="grid">
          <div class="accordion-item open">
            <button class="accordion-header" data-target="requestPanel">
              <span>Request a new loan</span>
              <span class="accordion-icon">▾</span>
            </button>
            <div id="requestPanel" class="accordion-body">
              <div class="card" style="margin-top: 12px;">
                <p class="muted">Create a new loan request and track it from submission to a final decision.</p>
                <form id="loanForm">
                  <label>Customer name</label>
                  <input id="customerName" required placeholder="John Doe" />
                  <label>Loan amount</label>
                  <input id="amount" type="number" min="1000" step="100" required placeholder="15000" />
                  <label>Optional note</label>
                  <textarea id="note" rows="4" placeholder="Add a short note for the approver"></textarea>
                  <button class="primary" type="submit">Submit request</button>
                </form>
                <div id="borrowerMessage" class="toast hidden"></div>
              </div>
            </div>
          </div>

          <div class="accordion-item">
            <button class="accordion-header" data-target="topUpPanel">
              <span>Top up an existing request</span>
              <span class="accordion-icon">▾</span>
            </button>
            <div id="topUpPanel" class="accordion-body">
              <div class="card" style="margin-top: 12px;">
                <p class="muted">Increase the amount on a pending request before it is reviewed.</p>
                <form id="topUpForm">
                  <label>Request ID</label>
                  <input id="topUpLoanId" type="number" min="1" required placeholder="1" />
                  <label>Top-up amount</label>
                  <input id="topUpAmount" type="number" min="100" step="100" required placeholder="3000" />
                  <label>Optional note</label>
                  <textarea id="topUpNote" rows="3" placeholder="Why are you increasing this request?"></textarea>
                  <button class="secondary" type="submit">Apply top-up</button>
                </form>
                <div id="topUpMessage" class="toast hidden"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="grid" style="margin-top: 20px;">
          <div class="card">
            <h3>Your submitted requests</h3>
            <div id="borrowerRequests"></div>
          </div>
        </div>
      </section>

      <section id="approverView" class="panel hidden">
        <h2>Approval queue</h2>
        <p class="muted">Review and approve or reject pending loan requests.</p>
        <div id="approvalQueue"></div>
      </section>
    </div>

    <script>
      const state = {
        role: 'borrower',
        requests: []
      };

      const borrowerView = document.getElementById('borrowerView');
      const approverView = document.getElementById('approverView');
      const roleSwitch = document.getElementById('roleSwitch');
      const accordionHeaders = document.querySelectorAll('.accordion-header');
      const roleLabel = document.getElementById('roleLabel');
      const borrowerForm = document.getElementById('loanForm');
      const topUpForm = document.getElementById('topUpForm');
      const borrowerMessage = document.getElementById('borrowerMessage');
      const topUpMessage = document.getElementById('topUpMessage');
      const borrowerRequests = document.getElementById('borrowerRequests');
      const approvalQueue = document.getElementById('approvalQueue');

      function setRole(role) {
        state.role = role;
        roleSwitch.classList.toggle('active', role === 'approver');
        roleLabel.textContent = role === 'borrower' ? 'Borrower mode' : 'Loan office mode';
        borrowerView.classList.toggle('hidden', role !== 'borrower');
        approverView.classList.toggle('hidden', role !== 'approver');
      }

      roleSwitch.addEventListener('click', () => {
        setRole(state.role === 'borrower' ? 'approver' : 'borrower');
      });

      accordionHeaders.forEach((button) => {
        button.addEventListener('click', () => {
          const item = button.closest('.accordion-item');
          document.querySelectorAll('.accordion-item').forEach((entry) => {
            if (entry !== item) entry.classList.remove('open');
          });
          item.classList.toggle('open');
        });
      });

      function showMessage(element, text, isError = false) {
        element.textContent = text;
        element.classList.remove('hidden');
        element.style.background = isError ? '#fef2f2' : '#eff6ff';
        element.style.color = isError ? '#991b1b' : '#1d4ed8';
        element.style.borderColor = isError ? '#fecaca' : '#bfdbfe';
      }

      async function fetchPendingRequests() {
        const response = await fetch('/approval/pending');
        if (!response.ok) throw new Error('Could not load requests');
        return response.json();
      }

      async function createLoanRequest(payload) {
        const response = await fetch('/approval/requests', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!response.ok) throw new Error('Could not submit request');
        return response.json();
      }

      async function updateDecision(loanId, action, note = '') {
        const response = await fetch(`/approval/${loanId}/${action}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: note ? JSON.stringify({ note }) : undefined
        });
        if (!response.ok) throw new Error('Could not update request');
        return response.json();
      }

      async function topUpRequest(loanId, amount, note = '') {
        const response = await fetch(`/approval/${loanId}/topup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ amount, note })
        });
        if (!response.ok) throw new Error('Could not top up request');
        return response.json();
      }

      async function refreshViews() {
        try {
          const pending = await fetchPendingRequests();
          const mapped = pending.map(item => ({
            loanId: item.loanId,
            customerName: item.customerName || 'Unknown',
            amount: item.amount || 0,
            status: item.status,
            note: item.note || ''
          }));
          state.requests = mapped;
          renderBorrowerRequests();
          renderApprovalQueue();
        } catch (error) {
          console.error(error);
        }
      }

      function renderBorrowerRequests() {
        if (!state.requests.length) {
          borrowerRequests.innerHTML = '<div class="empty">No requests yet. Submit one to get started.</div>';
          return;
        }
        borrowerRequests.innerHTML = state.requests.map(item => `
          <div class="request-card">
            <div class="row"><strong>#${item.loanId}</strong><span class="pill ${item.status.toLowerCase()}">${item.status}</span></div>
            <div class="status">Borrower: ${item.customerName || 'Unknown'}</div>
            <div class="status">Amount: ${Number(item.amount).toLocaleString()}</div>
            <div class="status">${item.note ? item.note : 'No note'}</div>
          </div>
        `).join('');
      }

      function renderApprovalQueue() {
        if (!state.requests.length) {
          approvalQueue.innerHTML = '<div class="empty">No pending requests right now.</div>';
          return;
        }
        approvalQueue.innerHTML = state.requests.map(item => `
          <div class="request-card">
            <div class="row"><strong>#${item.loanId} · ${item.customerName}</strong><span class="pill ${item.status.toLowerCase()}">${item.status}</span></div>
            <div class="status">Amount: ${Number(item.amount).toLocaleString()}</div>
            <div class="status">${item.note ? item.note : 'No note provided'}</div>
            <div class="row">
              <button class="success" data-action="approve" data-id="${item.loanId}">Approve</button>
              <button class="danger" data-action="reject" data-id="${item.loanId}">Reject</button>
            </div>
          </div>
        `).join('');
      }

      borrowerForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const payload = {
          customerName: document.getElementById('customerName').value.trim(),
          amount: Number(document.getElementById('amount').value),
          note: document.getElementById('note').value.trim()
        };
        try {
          const result = await createLoanRequest(payload);
          borrowerForm.reset();
          showMessage(borrowerMessage, `Request submitted successfully with ID #${result.loanId}`);
          await refreshViews();
        } catch (error) {
          showMessage(borrowerMessage, error.message, true);
        }
      });

      topUpForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const loanId = document.getElementById('topUpLoanId').value;
        const amount = Number(document.getElementById('topUpAmount').value);
        const note = document.getElementById('topUpNote').value.trim();
        try {
          const result = await topUpRequest(loanId, amount, note);
          topUpForm.reset();
          showMessage(topUpMessage, `Top-up applied. Updated amount for request #${result.loanId} is ${Number(result.amount).toLocaleString()}`);
          await refreshViews();
        } catch (error) {
          showMessage(topUpMessage, error.message, true);
        }
      });

      approvalQueue.addEventListener('click', async (event) => {
        const button = event.target.closest('button[data-action]');
        if (!button) return;
        const loanId = button.getAttribute('data-id');
        const action = button.getAttribute('data-action');
        try {
          await updateDecision(loanId, action);
          await refreshViews();
        } catch (error) {
          console.error(error);
        }
      });

      setRole('borrower');
      refreshViews();
    </script>
  </body>
</html>
